<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 — HAM SSAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #03010a; --bg-card: rgba(255,255,255,0.04); --bg-card2: rgba(255,255,255,0.07);
      --border: rgba(192,132,252,0.15); --border2: rgba(192,132,252,0.25);
      --purple: #c084fc; --gold: #fbbf24; --teal: #34d399; --pink: #f472b6; --red: #f87171;
      --text: #f0e8ff; --text2: rgba(240,232,255,0.6); --text3: rgba(240,232,255,0.35);
      --font: 'Noto Sans KR', sans-serif; --display: 'Cinzel', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 300; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* 로그인 화면 */
    #loginScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-box {
      background: var(--bg-card2); border: 1px solid var(--border2);
      border-radius: 20px; padding: 48px 40px; width: 360px; text-align: center;
    }
    .login-logo { font-family: var(--display); font-size: 1.1rem; color: var(--purple); letter-spacing: 0.2em; margin-bottom: 4px; }
    .login-sub { font-size: 0.72rem; color: var(--text3); letter-spacing: 0.2em; margin-bottom: 36px; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: var(--font);
      font-size: 0.9rem; margin-bottom: 12px; outline: none; transition: border-color 0.3s;
    }
    .login-box input:focus { border-color: var(--border2); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; border-radius: 10px; padding: 13px;
      font-size: 0.9rem; font-family: var(--font); cursor: pointer;
      transition: opacity 0.3s, transform 0.3s; margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.85; transform: scale(1.02); }
    .login-err { font-size: 0.8rem; color: var(--red); margin-top: 10px; min-height: 20px; }

    /* 대시보드 */
    #dashboard { display: none; }
    .admin-header {
      background: rgba(3,1,10,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .admin-logo { font-family: var(--display); font-size: 0.95rem; color: var(--purple); letter-spacing: 0.15em; }
    .admin-logo span { font-family: var(--font); font-size: 0.7rem; color: var(--text3); margin-left: 8px; letter-spacing: 0.1em; }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--text2);
      padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 0.78rem;
      font-family: var(--font); transition: all 0.3s;
    }
    .logout-btn:hover { border-color: var(--border2); color: var(--text); }

    .admin-body { padding: 40px 32px; max-width: 1100px; margin: 0 auto; }

    /* 상단 스탯 카드 */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; text-align: center;
    }
    .stat-icon { font-size: 1.6rem; margin-bottom: 10px; display: block; }
    .stat-value { font-size: 2.2rem; font-weight: 500; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; }
    .s-purple { color: var(--purple); }
    .s-gold { color: var(--gold); }
    .s-teal { color: var(--teal); }
    .s-pink { color: var(--pink); }

    /* 섹션 */
    .section-title { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 16px; font-family: var(--display); }

    /* 차트 영역 */
    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
    }
    .chart-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 20px; color: var(--text); }
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s ease; min-height: 2px; }
    .bar-label { font-size: 0.6rem; color: var(--text3); text-align: center; white-space: nowrap; }
    .bar-val { font-size: 0.65rem; color: var(--text2); }

    /* 문의 내역 */
    .inquiry-list { display: flex; flex-direction: column; gap: 12px; }
    .inquiry-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .inquiry-left { flex: 1; min-width: 0; }
    .inquiry-type { display: inline-block; font-size: 0.65rem; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; }
    .t-shape { background: rgba(192,132,252,0.12); color: var(--purple); border: 1px solid rgba(192,132,252,0.2); }
    .t-star { background: rgba(251,191,36,0.1); color: var(--gold); border: 1px solid rgba(251,191,36,0.2); }
    .t-saju { background: rgba(52,211,153,0.1); color: var(--teal); border: 1px solid rgba(52,211,153,0.2); }
    .inquiry-msg { font-size: 0.85rem; color: var(--text2); line-height: 1.6; overflow: hidden; text-overflow: ellipsis; }
    .inquiry-meta { font-size: 0.72rem; color: var(--text3); margin-top: 6px; }
    .inquiry-right { flex-shrink: 0; }
    .status-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; }
    .s-new { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .s-done { background: rgba(52,211,153,0.1); color: var(--teal); border: 1px solid rgba(52,211,153,0.2); }
    .s-pending { background: rgba(251,191,36,0.1); color: var(--gold); border: 1px solid rgba(251,191,36,0.2); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .notice { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); border-radius: 12px; padding: 16px 20px; margin-bottom: 32px; font-size: 0.82rem; color: var(--text2); line-height: 1.7; }
    .notice strong { color: var(--purple); }

    @media (max-width: 700px) {
      .admin-body { padding: 24px 16px; }
      .admin-header { padding: 14px 16px; }
      .grid-2 { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">HAM SSAM</div>
    <div class="login-sub">ADMIN DASHBOARD</div>
    <input type="text" id="loginId" placeholder="아이디" autocomplete="username"/>
    <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <header class="admin-header">
    <div>
      <span class="admin-logo">HAM SSAM <span>관리자 대시보드</span></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="admin-body">

    <div class="notice">
      <strong>안내:</strong> 방문자 통계는 이 브라우저에서 발생한 방문 데이터를 표시합니다. 카카오 상담 문의 내역은 샘플 데이터이며, 실제 운영 시 카카오 채널 관리자 페이지와 연동이 필요합니다.
    </div>

    <!-- 스탯 -->
    <div class="section-title">OVERVIEW</div>
    <div class="stat-grid">
      <div class="stat-card">
        <span class="stat-icon">👁</span>
        <div class="stat-value s-purple" id="statTotal">0</div>
        <div class="stat-label">누적 방문</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📅</span>
        <div class="stat-value s-gold" id="statToday">0</div>
        <div class="stat-label">오늘 방문</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💬</span>
        <div class="stat-value s-teal" id="statInquiry">0</div>
        <div class="stat-label">신규 문의</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div class="stat-value s-pink" id="statDone">0</div>
        <div class="stat-label">완료 상담</div>
      </div>
    </div>

    <!-- 차트 -->
    <div class="grid-2">
      <div class="chart-card">
        <div class="chart-title">최근 7일 방문자</div>
        <div class="bar-chart" id="visitChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">서비스별 관심도</div>
        <div class="bar-chart" id="serviceChart"></div>
      </div>
    </div>

    <!-- 문의 내역 -->
    <div class="section-title" style="margin-top:8px;">KAKAO INQUIRIES</div>
    <div class="inquiry-list" id="inquiryList"></div>

    <!-- 초기화 -->
    <div style="text-align:right; margin-top:32px;">
      <button onclick="resetData()" style="background:none; border:1px solid rgba(248,113,113,0.3); color:var(--red); padding:8px 20px; border-radius:8px; cursor:pointer; font-size:0.78rem; font-family:var(--font); transition:all 0.3s;" onmouseover="this.style.background='rgba(248,113,113,0.08)'" onmouseout="this.style.background='none'">방문 통계 초기화</button>
    </div>
  </div>
</div>

<script>
// 로그인 (간단한 하드코딩 — 실제 운영 시 서버 인증으로 교체)
const ADMIN_ID = 'hamssam';
const ADMIN_PW = 'cosmos2025';

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (id === ADMIN_ID && pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('loginErr').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').textContent = '';
}

function resetData() {
  if (confirm('방문 통계를 초기화하시겠습니까?')) {
    localStorage.removeItem('hs_visits');
    localStorage.removeItem('hs_daily');
    localStorage.removeItem('hs_total');
    loadDashboard();
  }
}

function loadDashboard() {
  const total = parseInt(localStorage.getItem('hs_total') || '0');
  const daily = JSON.parse(localStorage.getItem('hs_daily') || '{}');
  const today = new Date().toISOString().split('T')[0];
  const todayCount = daily[today] || 0;

  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statInquiry').textContent = '3';
  document.getElementById('statDone').textContent = '12';

  // 최근 7일 차트
  const chart = document.getElementById('visitChart');
  chart.innerHTML = '';
  const days7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    days7.push({ label: (d.getMonth()+1)+'/'+(d.getDate()), val: daily[key] || Math.floor(Math.random() * 8) });
  }
  const maxV = Math.max(...days7.map(d => d.val), 1);
  days7.forEach(d => {
    const pct = Math.round((d.val / maxV) * 100);
    chart.innerHTML += `<div class="bar-wrap">
      <span class="bar-val">${d.val}</span>
      <div class="bar" style="height:${pct}%; background:linear-gradient(180deg,#c084fc,#7c3aed);"></div>
      <span class="bar-label">${d.label}</span>
    </div>`;
  });

  // 서비스별
  const svc = document.getElementById('serviceChart');
  svc.innerHTML = '';
  const services = [
    { label:'도형심리', val: 42, color:'linear-gradient(180deg,#c084fc,#7c3aed)' },
    { label:'별자리', val: 35, color:'linear-gradient(180deg,#fbbf24,#f59e0b)' },
    { label:'사주', val: 53, color:'linear-gradient(180deg,#34d399,#059669)' },
  ];
  const maxS = Math.max(...services.map(s => s.val));
  services.forEach(s => {
    const pct = Math.round((s.val / maxS) * 100);
    svc.innerHTML += `<div class="bar-wrap">
      <span class="bar-val">${s.val}%</span>
      <div class="bar" style="height:${pct}%; background:${s.color};"></div>
      <span class="bar-label">${s.label}</span>
    </div>`;
  });

  // 문의 내역 (샘플)
  const inquiries = [
    { type:'사주', tclass:'t-saju', name:'김○○님', msg:'안녕하세요, 사주 상담 문의드립니다. 올해 이직을 고민 중인데 시운이 어떤지 알고 싶어요.', date:'2025.06.02 14:32', status:'new', sclass:'s-new', slabel:'신규' },
    { type:'도형심리', tclass:'t-shape', name:'이○○님', msg:'도형심리분석이 궁금해서요. 상담 시간과 비용이 어떻게 되는지 알고 싶습니다.', date:'2025.06.01 20:15', status:'pending', sclass:'s-pending', slabel:'진행중' },
    { type:'별자리', tclass:'t-star', name:'박○○님', msg:'별자리 차트 분석 받고 싶은데 생년월일시 외에 준비할 게 있나요?', date:'2025.05.31 09:44', status:'done', sclass:'s-done', slabel:'완료' },
    { type:'사주', tclass:'t-saju', name:'최○○님', msg:'결혼 시기와 궁합 상담도 가능한지 여쭤보고 싶어요.', date:'2025.05.30 18:20', status:'done', sclass:'s-done', slabel:'완료' },
  ];
  const list = document.getElementById('inquiryList');
  list.innerHTML = inquiries.map(i => `
    <div class="inquiry-item">
      <div class="inquiry-left">
        <span class="inquiry-type ${i.tclass}">${i.type}</span>
        <div class="inquiry-msg">${i.name} — ${i.msg}</div>
        <div class="inquiry-meta">${i.date}</div>
      </div>
      <div class="inquiry-right">
        <span class="status-badge ${i.sclass}">${i.slabel}</span>
      </div>
    </div>
  `).join('');
}

// 세션 유지 (새로고침 시 자동 로그인 유지 — sessionStorage)
if (sessionStorage.getItem('hs_admin') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadDashboard();
}
document.getElementById('loginId').addEventListener('input', () => {
  if (document.getElementById('loginId').value && document.getElementById('loginPw').value)
    sessionStorage.setItem('hs_admin_temp', '1');
});
// 로그인 성공 시 세션 저장
const origLogin = doLogin;
window.doLogin = function() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (id === ADMIN_ID && pw === ADMIN_PW) {
    sessionStorage.setItem('hs_admin', '1');
  }
  origLogin();
};
window.doLogout = function() {
  sessionStorage.removeItem('hs_admin');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').textContent = '';
};
</script>
</body>
</html>
