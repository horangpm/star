<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 함쌤의 별자리 분석</title>
<meta name="description" content="생년월일·탄생시간·탄생장소로 나만의 별자리 차트를 생성하세요.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #8B5CF6; --purple-l: #a78bfa;
  --gold: #F59E0B;   --gold-l: #fcd34d;
  --cyan: #06B6D4;   --cyan-l: #67e8f9;
  --white: #f0f0ff;  --gray: #94a3b8;
  --card: rgba(255,255,255,0.04);
  --border: rgba(139,92,246,0.3);
}
body { background: #03030f; color: var(--white); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
canvas#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── NEBULA ── */
.nebula { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.nebula::before { content:''; position:absolute; width:700px; height:700px; background:radial-gradient(circle,rgba(139,92,246,0.13) 0%,transparent 70%); top:-200px; left:-200px; animation:neb1 18s ease-in-out infinite alternate; }
.nebula::after  { content:''; position:absolute; width:500px; height:500px; background:radial-gradient(circle,rgba(6,182,212,0.09) 0%,transparent 70%); bottom:-100px; right:-100px; animation:neb2 14s ease-in-out infinite alternate; }
@keyframes neb1 { from{transform:translate(0,0)} to{transform:translate(50px,30px) scale(1.15)} }
@keyframes neb2 { from{transform:translate(0,0)} to{transform:translate(-30px,-50px) scale(1.1)} }

/* ── SECTIONS ── */
.z1 { position: relative; z-index: 1; }

/* ── LANDING ── */
#landing { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
.land-box { max-width:520px; width:100%; text-align:center; }
.badge { display:inline-block; background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(6,182,212,0.2)); border:1px solid rgba(139,92,246,0.4); border-radius:50px; padding:6px 22px; font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:3px; color:var(--purple-l); margin-bottom:22px; }
h1.logo { font-family:'Cinzel',serif; font-size:clamp(2rem,6vw,3rem); font-weight:700; background:linear-gradient(135deg,#f0f0ff,#a78bfa 50%,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.2; margin-bottom:14px; }
.sub { color:var(--gray); font-size:.95rem; margin-bottom:44px; }

/* ── FORM ── */
.form-wrap { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:24px; padding:36px 32px; backdrop-filter:blur(20px); box-shadow:0 0 60px rgba(139,92,246,0.08); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.fg { margin-bottom:18px; text-align:left; }
.fg label { display:block; font-size:.75rem; font-weight:500; color:var(--purple-l); letter-spacing:1px; margin-bottom:7px; }
.fg input { width:100%; padding:13px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:11px; color:var(--white); font-family:inherit; font-size:.93rem; outline:none; transition:.3s; }
.fg input:focus { border-color:var(--purple); box-shadow:0 0 18px rgba(139,92,246,0.25); background:rgba(139,92,246,0.06); }
.fg input::placeholder { color:rgba(148,163,184,0.45); }
.fg input::-webkit-calendar-picker-indicator { filter:invert(.6) sepia(1) saturate(4) hue-rotate(240deg); }
.btn-main { width:100%; padding:15px; background:linear-gradient(135deg,#8B5CF6,#6366F1); border:none; border-radius:13px; color:#fff; font-family:'Cinzel',serif; font-size:.95rem; font-weight:600; letter-spacing:2px; cursor:pointer; transition:.3s; box-shadow:0 4px 20px rgba(139,92,246,0.35); }
.btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(139,92,246,0.55); }

/* ── LOADING ── */
#loading { display:none; position:fixed; inset:0; background:rgba(3,3,15,.96); z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:22px; }
.loader { width:76px; height:76px; position:relative; }
.loader::before,.loader::after { content:''; position:absolute; border-radius:50%; animation:spin 1.4s linear infinite; }
.loader::before { inset:0; border:2px solid transparent; border-top-color:var(--purple); border-right-color:var(--cyan); }
.loader::after { inset:14px; border:2px solid transparent; border-bottom-color:var(--gold); animation-duration:.9s; animation-direction:reverse; }
@keyframes spin { to{transform:rotate(360deg)} }
.load-txt { font-family:'Cinzel',serif; font-size:.85rem; letter-spacing:3px; color:var(--purple-l); animation:blink 1.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.5} 50%{opacity:1} }

/* ── APP ── */
#app { display:none; z-index:1; padding:0 20px 80px; }
.container { max-width:1080px; margin:0 auto; }
.app-head { text-align:center; padding:56px 20px 36px; }
.app-name { font-family:'Cinzel',serif; font-size:clamp(1.5rem,3.5vw,2.2rem); background:linear-gradient(135deg,#f0f0ff,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.app-info { color:var(--gray); font-size:.85rem; margin-top:8px; }
.btn-back { background:none; border:1px solid var(--border); border-radius:50px; padding:9px 22px; color:var(--purple-l); font-family:inherit; font-size:.82rem; cursor:pointer; transition:.3s; }
.btn-back:hover { background:rgba(139,92,246,0.1); }

/* ── PLANET STRIP ── */
.p-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:44px; }
.p-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 12px; text-align:center; transition:.3s; }
.p-card:hover { transform:translateY(-4px); box-shadow:0 8px 28px rgba(139,92,246,0.14); }
.p-icon { font-size:1.7rem; margin-bottom:7px; }
.p-label { font-size:.68rem; color:var(--gray); margin-bottom:3px; letter-spacing:1px; }
.p-sign { font-size:1rem; font-weight:600; }
.p-deg { font-size:.72rem; color:var(--gray); margin-top:2px; }

/* ── GRID ── */
.main-grid { display:grid; grid-template-columns:400px 1fr; gap:28px; margin-bottom:40px; }
@media(max-width:860px){.main-grid{grid-template-columns:1fr;}}

/* ── CHART ── */
.chart-wrap { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:22px; text-align:center; }
.chart-wrap h3 { font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:3px; color:var(--purple-l); margin-bottom:16px; }
#chartSvg { width:100%; max-width:370px; height:auto; }

/* ── CARDS ── */
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
.card h2 { font-family:'Cinzel',serif; font-size:.9rem; letter-spacing:2px; color:var(--gold-l); margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid rgba(245,158,11,0.18); }
.card p, .card li { color:#c8c8e8; font-size:.87rem; line-height:1.85; }

/* ── TRAITS ── */
.traits { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px; }
.t-box { padding:14px; border-radius:11px; }
.t-box.pos { background:rgba(132,204,22,.06); border:1px solid rgba(132,204,22,.2); }
.t-box.neg { background:rgba(239,68,68,.06); border:1px solid rgba(239,68,68,.2); }
.t-box h4 { font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:1px; margin-bottom:10px; }
.t-box.pos h4 { color:#86efac; } .t-box.neg h4 { color:#fca5a5; }
.t-box ul { list-style:none; }
.t-box ul li { font-size:.82rem; color:#c8c8e8; padding:4px 0; display:flex; gap:7px; }
.t-box.pos ul li::before { content:'✦'; color:#86efac; font-size:.65rem; margin-top:4px; flex-shrink:0; }
.t-box.neg ul li::before { content:'◇'; color:#fca5a5; font-size:.65rem; margin-top:4px; flex-shrink:0; }

/* ── ELEMENT BADGES ── */
.el-row { display:flex; gap:12px; flex-wrap:wrap; margin:12px 0; }
.el-chip { padding:7px 15px; border-radius:50px; font-size:.8rem; font-weight:500; }
.el-chip.fire { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
.el-chip.earth{ background:rgba(132,204,22,.1); border:1px solid rgba(132,204,22,.3); color:#bbf7d0; }
.el-chip.air  { background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.3); color:#bae6fd; }
.el-chip.water{ background:rgba(129,140,248,.1); border:1px solid rgba(129,140,248,.3); color:#c4b5fd; }

/* ── FORTUNE ── */
.f-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
.f-item { padding:16px; border-radius:12px; background:rgba(139,92,246,.05); border:1px solid rgba(139,92,246,.2); }
.f-item h4 { font-family:'Cinzel',serif; font-size:.73rem; letter-spacing:1px; color:var(--purple-l); margin-bottom:8px; }
.f-item p { font-size:.82rem; color:#c8c8e8; line-height:1.8; }
.f-item .advice { margin-top:8px; padding:8px 12px; border-radius:8px; background:rgba(245,158,11,0.06); border-left:3px solid rgba(245,158,11,0.4); font-size:.78rem; color:#fcd34d; line-height:1.7; }
.stars { font-size:.72rem; color:var(--gold-l); margin-top:6px; }
.fortune-summary { padding:20px; border-radius:14px; background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(6,182,212,0.06)); border:1px solid rgba(139,92,246,0.25); margin-bottom:18px; }
.fortune-summary p { font-size:.88rem; color:#d8d8f0; line-height:1.95; }
.fortune-summary strong { color:var(--white); }

/* ── MONTHLY ── */
.m-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px; }
.m-card { padding:14px; border-radius:11px; background:rgba(6,182,212,.05); border:1px solid rgba(6,182,212,.18); text-align:center; }
.m-card .mn { font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:2px; color:var(--cyan-l); margin-bottom:7px; }
.m-card .mr { font-size:1rem; margin-bottom:5px; }
.m-card .md { font-size:.76rem; color:var(--gray); line-height:1.6; }

/* ── COMPAT ── */
.c-row { display:flex; flex-wrap:wrap; gap:9px; margin-top:12px; }
.c-chip { padding:5px 14px; border-radius:50px; font-size:.8rem; }
.c-chip.g { background:rgba(132,204,22,.1); border:1px solid rgba(132,204,22,.3); color:#bbf7d0; }
.c-chip.b { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); color:#fca5a5; }
.compat-detail { margin-top:14px; }
.compat-card { padding:14px 16px; border-radius:11px; margin-bottom:10px; }
.compat-card:last-child { margin-bottom:0; }
.compat-card.good { background:rgba(132,204,22,.04); border:1px solid rgba(132,204,22,.15); }
.compat-card.bad { background:rgba(239,68,68,.04); border:1px solid rgba(239,68,68,.12); }
.compat-card h5 { font-size:.85rem; font-weight:700; margin-bottom:6px; }
.compat-card.good h5 { color:#86efac; }
.compat-card.bad h5 { color:#fca5a5; }
.compat-card p { font-size:.82rem; color:#c8c8e8; line-height:1.8; }
.need-box { margin-top:20px; padding:20px; border-radius:14px; background:linear-gradient(135deg,rgba(6,182,212,0.06),rgba(139,92,246,0.06)); border:1px solid rgba(6,182,212,0.25); }
.need-box h4 { font-family:'Cinzel',serif; font-size:.82rem; letter-spacing:1px; color:var(--cyan-l); margin-bottom:12px; }
.need-box p { font-size:.84rem; color:#c8c8e8; line-height:1.9; }
.need-box strong { color:var(--white); }

/* ── PLANET MEANING ── */
.pm-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:4px; }
.pm-item { padding:18px; border-radius:13px; background:rgba(255,255,255,0.03); border:1px solid rgba(139,92,246,0.18); transition:.3s; }
.pm-item:hover { background:rgba(139,92,246,0.06); border-color:rgba(139,92,246,0.35); }
.pm-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.pm-icon { font-size:1.6rem; }
.pm-info {} 
.pm-title { font-size:.95rem; font-weight:700; margin-bottom:2px; }
.pm-role { font-size:.72rem; color:var(--gray); letter-spacing:1px; }
.pm-desc { font-size:.83rem; color:#c8c8e8; line-height:1.85; }
.pm-desc strong { color:var(--white); }

/* ── HOUSES ── */
.h-house-card { margin-bottom:18px; padding:20px; border-radius:14px; background:rgba(139,92,246,0.04); border:1px solid rgba(139,92,246,0.2); transition:.3s; }
.h-house-card:hover { background:rgba(139,92,246,0.08); border-color:rgba(139,92,246,0.4); }
.h-house-card:last-child { margin-bottom:0; }
.h-head { display:flex; align-items:center; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
.h-num-badge { display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:50%; background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.4); font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:var(--purple-l); flex-shrink:0; }
.h-head-info { flex:1; }
.h-theme-txt { font-size:.95rem; font-weight:700; color:var(--white); margin-bottom:3px; }
.h-sign-txt { font-size:.78rem; color:var(--gray); }
.h-planets-strip { display:flex; gap:7px; flex-wrap:wrap; }
.h-planet-tag { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:50px; font-size:.76rem; font-weight:600; border:1px solid; }
.h-body { border-top:1px solid rgba(139,92,246,0.12); padding-top:12px; }
.h-body p { font-size:.86rem; color:#c8c8e8; line-height:1.9; margin-bottom:8px; }
.h-body p:last-child { margin-bottom:0; }
.h-body strong { color:var(--white); }
.h-tip { display:flex; align-items:flex-start; gap:8px; padding:10px 13px; border-radius:9px; background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.18); margin-top:10px; }
.h-tip .tip-icon { font-size:1rem; flex-shrink:0; margin-top:1px; }
.h-tip p { font-size:.81rem; color:#fcd34d; line-height:1.75; margin:0; }

/* ── PDF BTN ── */
.pdf-wrap { text-align:center; margin-top:44px; }
.btn-pdf { display:inline-flex; align-items:center; gap:10px; padding:16px 44px; background:linear-gradient(135deg,rgba(245,158,11,.14),rgba(245,158,11,.04)); border:1px solid rgba(245,158,11,.45); border-radius:50px; color:var(--gold-l); font-family:'Cinzel',serif; font-size:.9rem; letter-spacing:2px; cursor:pointer; transition:.3s; }
.btn-pdf:hover { box-shadow:0 0 40px rgba(245,158,11,.25); transform:translateY(-2px); }

/* ── PDF HIDDEN ── */
#pdf-root { display:none; }

/* ── PRINT MEDIA QUERY ── */
@media print {
  body { background: #ffffff !important; overflow: visible !important; margin:0 !important; padding:0 !important; }
  body > *:not(#pdf-root) { display: none !important; }
  #pdf-root { display: block !important; position: static !important; width: 100% !important; margin: 0 !important; background:#ffffff !important; color:#334155 !important; }
  @page { margin: 12mm; size: auto; }
}
.pdf-pb { break-before:page; page-break-before:always; }
.pdf-h1 { font-family:'Cinzel',serif; font-size:1.8rem; color:#f0f0ff; text-align:center; margin-bottom:6px; }
.pdf-sub { text-align:center; color:#a78bfa; font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:4px; margin-bottom:16px; }
.pdf-name { text-align:center; font-size:1.8rem; font-weight:700; color:#fcd34d; margin:14px 0 6px; }
.pdf-info { text-align:center; color:#94a3b8; font-size:.88rem; margin-bottom:16px; }
.pdf-ps { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:18px 0; }
.pdf-pi { text-align:center; padding:12px 8px; border:1px solid rgba(139,92,246,.22); border-radius:11px; background:rgba(139,92,246,.04); }
.pdf-pi .icon { font-size:1.3rem; } .pdf-pi .lbl { font-size:.62rem; color:#8B5CF6; margin:3px 0 2px; } .pdf-pi .val { font-size:.88rem; font-weight:600; }
.pdf-sec { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:#fcd34d; border-bottom:1px solid rgba(245,158,11,.25); padding-bottom:8px; margin:20px 0 12px; letter-spacing:2px; }
.pdf-ssec { font-size:.82rem; font-weight:700; color:#a78bfa; margin:12px 0 6px; }
.pdf-p { font-size:.85rem; line-height:1.85; color:#c8c8e8; }
.pdf-tg { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:10px 0; }
.pdf-tb { padding:12px; border-radius:9px; }
.pdf-tb.st { background:rgba(132,204,22,.06); border:1px solid rgba(132,204,22,.2); }
.pdf-tb.wk { background:rgba(239,68,68,.06); border:1px solid rgba(239,68,68,.2); }
.pdf-tb h5 { font-size:.76rem; font-weight:700; margin-bottom:7px; }
.pdf-tb.st h5 { color:#86efac; } .pdf-tb.wk h5 { color:#fca5a5; }
.pdf-tb ul { list-style:none; }
.pdf-tb ul li { font-size:.79rem; color:#c8c8e8; padding:2px 0; display:flex; gap:5px; }
.pdf-tb.st ul li::before { content:'✦'; color:#86efac; font-size:.6rem; margin-top:3px; }
.pdf-tb.wk ul li::before { content:'◇'; color:#fca5a5; font-size:.6rem; margin-top:3px; }
.pdf-fg { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0; }
.pdf-fi { padding:12px; border-radius:9px; background:rgba(139,92,246,.04); border:1px solid rgba(139,92,246,.18); }
.pdf-fi h5 { font-size:.73rem; color:#a78bfa; font-weight:700; margin-bottom:5px; }
.pdf-fi p { font-size:.78rem; color:#c8c8e8; line-height:1.65; }
.pdf-cr { display:flex; flex-wrap:wrap; gap:7px; margin:8px 0; }
.pdf-cc { padding:3px 12px; border-radius:50px; font-size:.77rem; }
.pdf-cc.g { background:rgba(132,204,22,.09); border:1px solid rgba(132,204,22,.28); color:#bbf7d0; }
.pdf-cc.c { background:rgba(239,68,68,.09); border:1px solid rgba(239,68,68,.22); color:#fca5a5; }
.pdf-ft { margin-top:auto; padding-top:14px; border-top:1px solid rgba(139,92,246,.18); text-align:center; font-size:.7rem; color:#475569; }
.pdf-logo { color:#8B5CF6; font-weight:700; }

@media(max-width:600px){.form-row,.traits,.f-grid,.m-grid,.p-strip{grid-template-columns:1fr 1fr;}.p-strip{grid-template-columns:repeat(2,1fr);}.form-wrap{padding:24px 18px;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="nebula"></div>

<!-- LANDING -->
<section id="landing" class="z1">
  <div class="land-box">
    <div class="badge">✦ HAM SSAM STAR ✦</div>
    <h1 class="logo">별자리 분석<br>우주 차트</h1>
    <p class="sub">탄생의 순간, 별들이 당신에게 보낸 메시지</p>
    <div class="form-wrap">
      <form id="bForm">
        <div class="fg">
          <label>✦ 이름</label>
          <input type="text" id="iName" placeholder="성함을 입력해 주세요" required>
        </div>
        <div class="form-row">
          <div class="fg">
            <label>☀ 생년월일</label>
            <input type="date" id="iDate" required>
          </div>
          <div class="fg">
            <label>🌙 탄생시간 (선택)</label>
            <input type="time" id="iTime">
          </div>
        </div>
        <div class="fg">
          <label>🌍 탄생장소</label>
          <input type="text" id="iPlace" placeholder="예: 서울, 부산, 도쿄, 뉴욕" required>
        </div>
        <button type="submit" class="btn-main">✨ 별자리 차트 생성</button>
      </form>
    </div>
  </div>
</section>

<!-- LOADING -->
<div id="loading" style="display:none;">
  <div class="loader"></div>
  <div class="load-txt">우주의 별을 계산 중...</div>
</div>

<!-- APP -->
<section id="app" class="z1">
  <div class="container">
    <div style="padding:20px 0 0;">
      <button class="btn-back" onclick="goBack()">← 다시 입력</button>
    </div>
    <div class="app-head">
      <div class="app-name" id="dName"></div>

/* ─── ASTRONOMY ─── */
function norm(a) { return ((a % 360) + 360) % 360; }

function toJD(yr, mo, dy, hr, mn, tz) {
  var uh = hr - tz + mn / 60;
  var d = dy + uh / 24;
  var m = mo, y = yr;
  if (m <= 2) { y--; m += 12; }
  var A = Math.floor(y / 100);
  var B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

function calcSun(jd) {
  var T = (jd - 2451545) / 36525;
  var L = norm(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
  var M = norm(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
  var Mr = M * D2R;
  var C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mr)
        + (0.019993 - 0.000101 * T) * Math.sin(2 * Mr)
        + 0.000289 * Math.sin(3 * Mr);
  return norm(L + C);
}

function calcMoon(jd) {
  var T = (jd - 2451545) / 36525;
  var L  = 218.3164477 + 481267.88123421 * T - 0.0015786 * T * T;
  var M  = norm(134.9633964 + 477198.8676313 * T + 0.0089970 * T * T) * D2R;
  var Ms = norm(357.5291092 + 35999.0502909  * T) * D2R;
  var F  = norm(93.2720950  + 483202.0175233 * T - 0.0036539 * T * T) * D2R;
  var D  = norm(297.8501921 + 445267.1114034 * T - 0.0018819 * T * T) * D2R;
  var c  = 6.288774*Math.sin(M)
         + 1.274027*Math.sin(2*D-M)
         + 0.658314*Math.sin(2*D)
         + 0.213618*Math.sin(2*M)
         - 0.185116*Math.sin(Ms)
         - 0.114332*Math.sin(2*F)
         + 0.058793*Math.sin(2*D-2*M)
         + 0.057066*Math.sin(2*D-Ms-M)
         + 0.053322*Math.sin(2*D+M);
  return norm(L + c);
}

function calcMercury(jd) {
  var T = (jd - 2451545) / 36525;
  var L  = norm(252.2509 + 149472.6746 * T);
  var M  = norm(174.7948 + 149472.5153 * T) * D2R;
  var Ms = norm(357.5291 + 35999.0503  * T) * D2R;
  return norm(L + 23.44*Math.sin(M) + 2.9818*Math.sin(2*M) + 0.5255*Math.sin(3*M) - 0.1800*Math.sin(Ms));
}

function calcVenus(jd) {
  var T = (jd - 2451545) / 36525;
  var L = norm(181.9798 + 58517.8156 * T);
  var M = norm(212.3464 + 58517.8039 * T) * D2R;
  return norm(L + 0.7758*Math.sin(M) + 0.0033*Math.sin(2*M));
}

function calcMars(jd) {
  var T = (jd - 2451545) / 36525;
  var L = norm(355.4332 + 19140.2993 * T);
  var M = norm(19.373   + 19140.3012 * T) * D2R;
  return norm(L + 10.6912*Math.sin(M) + 0.6228*Math.sin(2*M));
}

function calcJupiter(jd) {
  var T = (jd - 2451545) / 36525;
  var L = norm(34.3515  + 3034.9057 * T);
  var M = norm(20.9121  + 3034.7354 * T) * D2R;
  return norm(L + 5.5549*Math.sin(M) + 0.1683*Math.sin(2*M));
}

function calcSaturn(jd) {
  var T = (jd - 2451545) / 36525;
  var L = norm(50.0774  + 1222.1138 * T);
  var M = norm(317.0207 + 1222.1139 * T) * D2R;
  return norm(L + 6.3585*Math.sin(M) + 0.2204*Math.sin(2*M));
}

function calcASC(jd, lat, lon) {
  var T    = (jd - 2451545) / 36525;
  var GMST = norm(280.46061837 + 360.98564736629*(jd-2451545) + 0.000387933*T*T);
  var UT   = ((jd + 0.5) % 1) * 360;
  var LST  = norm(GMST + lon + UT);
  var E    = 23.4393 - 0.0130 * T;
  var e    = E * D2R;
  var phi  = lat * D2R;
  var RAMC = LST * D2R;
  var asc  = Math.atan2(-Math.cos(RAMC), Math.sin(RAMC)*Math.cos(e) + Math.tan(phi)*Math.sin(e)) * R2D;
  return norm(asc);
}

/* ─── SVG CHART ─── */
function drawChart(svgEl, planets, ascLon) {
  svgEl.innerHTML = '';
  var NS = 'http://www.w3.org/2000/svg';
  var cx = 185, cy = 185;
  var Ro = 165, Rs = 143, Rh = 118, Rp = 88, Rc = 26;

  function mk(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    Object.keys(attrs).forEach(function(k){ e.setAttribute(k, attrs[k]); });
    return e;
  }
  function mtxt(x, y, str, attrs) {
    var e = document.createElementNS(NS, 'text');
    e.setAttribute('x', x); e.setAttribute('y', y);
    Object.keys(attrs).forEach(function(k){ e.setAttribute(k, attrs[k]); });
    e.textContent = str;
    return e;
  }

  /* sector using polygon (avoids arc direction issues) */
  function sectorPath(cx, cy, r, aDeg, bDeg) {
    var pts = [cx + ' ' + cy];
    var steps = 10;
    for (var i = 0; i <= steps; i++) {
      var angle = (aDeg + (bDeg - aDeg) * i / steps) * D2R;
      var x = cx + r * Math.cos(angle);
      var y = cy - r * Math.sin(angle);
      pts.push(x + ' ' + y);
    }
    return 'M ' + pts.join(' L ') + ' Z';
  }

  /* defs */
  var defs = mk('defs', {});
  var filt = mk('filter', {id:'gw', x:'-30%', y:'-30%', width:'160%', height:'160%'});
  var feB  = mk('feGaussianBlur', {stdDeviation:'3', result:'blur'});
  feB.setAttribute('in', 'SourceGraphic');
  var feM  = mk('feMerge', {});
  var mn1  = mk('feMergeNode', {}); mn1.setAttribute('in','blur');
  var mn2  = mk('feMergeNode', {}); mn2.setAttribute('in','SourceGraphic');
  feM.appendChild(mn1); feM.appendChild(mn2);
  filt.appendChild(feB); filt.appendChild(feM);
  defs.appendChild(filt);

  var cg = mk('radialGradient', {id:'cg', cx:'50%', cy:'50%', r:'50%'});
  var cs1 = mk('stop', {offset:'0%', 'stop-color':'#8B5CF6', 'stop-opacity':'0.5'});
  var cs2 = mk('stop', {offset:'100%', 'stop-color':'#8B5CF6', 'stop-opacity':'0'});
  cg.appendChild(cs1); cg.appendChild(cs2);
  defs.appendChild(cg);
  svgEl.appendChild(defs);

  /* background */
  svgEl.appendChild(mk('circle', {cx:cx, cy:cy, r:Ro, fill:'#060620', stroke:'rgba(139,92,246,0.35)', 'stroke-width':'1'}));

  var ELC = { fire:'rgba(239,68,68,0.16)', earth:'rgba(132,204,22,0.12)', air:'rgba(96,165,250,0.14)', water:'rgba(129,140,248,0.16)' };

  /* 12 sign sectors */
  for (var i = 0; i < 12; i++) {
    var sk  = SKEYS[i];
    var sig = SD[sk];
    /* Chart: ASC is at the LEFT (180° in screen math coords) */
    /* For sector i: starts at ascLon + i*30 in ecliptic, maps to screen */
    var startEcl = ascLon + i * 30;   /* ecliptic start longitude */
    var aDeg = 180 - startEcl;        /* screen angle start */
    var bDeg = 180 - (startEcl + 30); /* screen angle end */
    var path = sectorPath(cx, cy, Ro, aDeg, bDeg);
    svgEl.appendChild(mk('path', {d:path, fill:ELC[sig.el], stroke:'rgba(139,92,246,0.2)', 'stroke-width':'0.6'}));

    /* sign symbol */
    var midDeg = 180 - (startEcl + 15);
    var smr = (Ro + Rs) / 2;
    var sx = cx + smr * Math.cos(midDeg * D2R);
    var sy = cy - smr * Math.sin(midDeg * D2R);
    svgEl.appendChild(mtxt(sx, sy, sig.sym, {'text-anchor':'middle','dominant-baseline':'middle','font-size':'12','fill':sig.color,'filter':'url(#gw)'}));
  }

  /* house ring */
  svgEl.appendChild(mk('circle', {cx:cx, cy:cy, r:Rh, fill:'none', stroke:'rgba(139,92,246,0.4)', 'stroke-width':'0.8'}));

  /* house lines & numbers */
  for (var h = 0; h < 12; h++) {
    var hEcl = ascLon + h * 30;
    var hA = (180 - hEcl) * D2R;
    var hx1 = cx + Rh * Math.cos(hA), hy1 = cy - Rh * Math.sin(hA);
    var hx2 = cx + Ro * Math.cos(hA), hy2 = cy - Ro * Math.sin(hA);
    svgEl.appendChild(mk('line', {x1:hx1,y1:hy1,x2:hx2,y2:hy2, stroke:'rgba(139,92,246,0.3)', 'stroke-width':'0.7'}));

    var nmEcl = ascLon + h * 30 + 15;
    var nmA = (180 - nmEcl) * D2R;
    var nr = (Rh + Rp) / 2;
    var nx = cx + nr * Math.cos(nmA), ny = cy - nr * Math.sin(nmA);
    svgEl.appendChild(mtxt(nx, ny, String(h + 1), {'text-anchor':'middle','dominant-baseline':'middle','font-size':'9','fill':'rgba(139,92,246,0.55)'}));
  }

  /* planet orbit ring */
  svgEl.appendChild(mk('circle', {cx:cx, cy:cy, r:Rp, fill:'none', stroke:'rgba(139,92,246,0.12)', 'stroke-width':'0.5', 'stroke-dasharray':'3,4'}));

  /* center */
  svgEl.appendChild(mk('circle', {cx:cx, cy:cy, r:Rc, fill:'url(#cg)', stroke:'rgba(139,92,246,0.5)', 'stroke-width':'1'}));
  svgEl.appendChild(mtxt(cx, cy, '✦', {'text-anchor':'middle','dominant-baseline':'middle','font-size':'14','fill':'#a78bfa'}));

  /* planets */
  var pList = [
    {key:'sun',     lon:planets.sun.lon},
    {key:'moon',    lon:planets.moon.lon},
    {key:'mercury', lon:planets.mercury.lon},
    {key:'venus',   lon:planets.venus.lon},
    {key:'mars',    lon:planets.mars.lon},
    {key:'jupiter', lon:planets.jupiter.lon},
    {key:'saturn',  lon:planets.saturn.lon},
    {key:'asc',     lon:ascLon}
  ];
  var used = [];
  pList.forEach(function(p) {
    var screenDeg = 180 - (p.lon - ascLon);
    /* avoid overlap */
    var adj = screenDeg;
    var tries = 0;
    while (tries < 72) {
      var ok = true;
      for (var ui = 0; ui < used.length; ui++) {
        var diff = Math.abs(((adj - used[ui] + 540) % 360) - 180);
        if (diff < 9) { ok = false; break; }
      }
      if (ok) break;
      adj += 5; tries++;
    }
    used.push(adj);

    var a = adj * D2R;
    var px = cx + Rp * Math.cos(a);
    var py = cy - Rp * Math.sin(a);
    var col = PC[p.key];
    var ic  = PI[p.key];

    svgEl.appendChild(mk('circle', {cx:px, cy:py, r:11, fill:col+'22', stroke:col, 'stroke-width':'1.4'}));
    svgEl.appendChild(mtxt(px, py, ic, {'text-anchor':'middle','dominant-baseline':'middle','font-size':'10','fill':col}));

    /* connector line */
    var ox = cx + Ro * Math.cos(a), oy = cy - Ro * Math.sin(a);
    var lx = cx + (Rp + 13) * Math.cos(a), ly = cy - (Rp + 13) * Math.sin(a);
    svgEl.appendChild(mk('line', {x1:lx,y1:ly,x2:ox,y2:oy, stroke:col+'28','stroke-width':'0.7','stroke-dasharray':'2,3'}));
  });

  /* ASC marker */
  var ascA = 180 * D2R; /* ASC is always at 180° in screen coords */
  var ax = cx + Ro * Math.cos(ascA), ay = cy - Ro * Math.sin(ascA);
  svgEl.appendChild(mk('circle', {cx:ax-8, cy:ay, r:5, fill:'#34D39930', stroke:'#34D399', 'stroke-width':'1.2'}));
  svgEl.appendChild(mtxt(ax-22, ay-12, 'AC', {'text-anchor':'middle','font-size':'8','fill':'#34D399','font-weight':'bold'}));
}

/* ─── ASPECT HELPERS ─── */
function getAspect(k1, k2) {
  var i1 = SKEYS.indexOf(k1), i2 = SKEYS.indexOf(k2);
  if (i1 < 0 || i2 < 0) return 'neutral';
  var d = Math.min(Math.abs(i1-i2), 12-Math.abs(i1-i2));
  if (d===0) return 'conj';
  if (d===4||d===8) return 'trine';
  if (d===2||d===10) return 'sext';
  if (d===3||d===9) return 'square';
  if (d===6) return 'opp';
  return 'neutral';

function groupSignsByReason(signs, reasonFunc, el) {
  var groups = {};
  signs.forEach(function(s) {
    var r = reasonFunc(el, s);
    if (!groups[r]) groups[r] = [];
    groups[r].push(s);
  });
  return Object.keys(groups).map(function(r) {
    return { signs: groups[r], reason: r };
  });
}

/* ─── FORM SUBMIT ─── */
document.getElementById('bForm').addEventListener('submit', function(e) {
  e.preventDefault();

  var name  = document.getElementById('iName').value.trim();
  var dateV = document.getElementById('iDate').value;
  var timeV = document.getElementById('iTime').value || '12:00';
  var place = document.getElementById('iPlace').value.trim();

  if (!name || !dateV || !place) return;

  var parts = dateV.split('-');
  var yr = parseInt(parts[0], 10);
  var mo = parseInt(parts[1], 10);
  var dy = parseInt(parts[2], 10);
  var tparts = timeV.split(':');
  var hr = parseInt(tparts[0], 10);
  var mn = parseInt(tparts[1], 10);

  var city = findCity(place);
  var jd   = toJD(yr, mo, dy, hr, mn, city.tz);

  var sunL  = calcSun(jd);
  var moonL = calcMoon(jd);
  var mercL = calcMercury(jd);
  var venL  = calcVenus(jd);
  var marL  = calcMars(jd);
  var jupL  = calcJupiter(jd);
  var satL  = calcSaturn(jd);
  var ascL  = calcASC(jd, city.lat, city.lon);

  var planets = {
    sun:     Object.assign(lonToSign(sunL),  {lon: sunL}),
    moon:    Object.assign(lonToSign(moonL), {lon: moonL}),
    mercury: Object.assign(lonToSign(mercL), {lon: mercL}),
    venus:   Object.assign(lonToSign(venL),  {lon: venL}),
    mars:    Object.assign(lonToSign(marL),  {lon: marL}),
    jupiter: Object.assign(lonToSign(jupL),  {lon: jupL}),
    saturn:  Object.assign(lonToSign(satL),  {lon: satL}),
    asc:     Object.assign(lonToSign(ascL),  {lon: ascL})
  };

  G = { name:name, birthDate:dateV, birthTime:timeV, birthPlace:place, planets:planets, city:city };

  /* Show loading */
  var loading = document.getElementById('loading');
  loading.style.display = 'flex';

  setTimeout(function() {
    loading.style.display = 'none';

    document.getElementById('dName').textContent = name + '의 별자리 차트';
    document.getElementById('dInfo').textContent = dateV + ' ' + timeV + ' | ' + place + ' (' + city.lat.toFixed(2) + '°N, ' + city.lon.toFixed(2) + '°E)';

    /* Draw chart */
    drawChart(document.getElementById('chartSvg'), planets, ascL);

    /* Generate analysis */
    generate(G);

    /* Switch views */
    document.getElementById('landing').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    window.scrollTo(0, 0);
  }, 2000);
});

function goBack() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  window.scrollTo(0, 0);
}
